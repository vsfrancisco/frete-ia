<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Cotações - Frete IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <header class="bg-indigo-600 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
                <span class="text-2xl text-white">🚚</span>
                <h1 class="text-xl font-bold text-white tracking-wide">Frete IA <span class="text-indigo-200 text-sm font-normal">Pro</span></h1>
            </a>
            <a href="/" class="text-white text-sm bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-md transition font-medium border border-indigo-400">
                &larr; Nova Cotação
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Histórico de Cotações (CRM)</h2>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cliente</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rota</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Preço Base</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider text-indigo-600 font-bold">Sugestão IA</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="bg-white divide-y divide-gray-200">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="loading" class="p-8 text-center text-gray-400">
                Carregando cotações...
            </div>
            <div id="vazio" class="hidden p-8 text-center text-gray-400">
                Nenhuma cotação encontrada no histórico.
            </div>
        </div>
    </main>

    <script>
        const formatarMoeda = (valor) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);

        async function carregarHistorico() {
            try {
                const res = await fetch('/api/simulacoes');
                const simulacoes = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                
                if(simulacoes.length === 0) {
                    document.getElementById('vazio').classList.remove('hidden');
                    return;
                }

                const tbody = document.getElementById('tabela-corpo');
                tbody.innerHTML = '';

                simulacoes.forEach(sim => {
                    const row = document.createElement('tr');
                    row.className = sim.frete_fechado ? "bg-green-50/50" : "hover:bg-gray-50";
                    
                    const cliente = sim.cliente_nome || '<span class="text-gray-400 italic">Sem cliente</span>';
                    const origemSplit = sim.origem.split('/')[0];
                    const destinoSplit = sim.destino.split('/')[0];
                    const rota = `${origemSplit} &rarr; ${destinoSplit}`;
                    
                    let statusBtn = '';
                    if (sim.frete_fechado) {
                        statusBtn = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">✅ Fechado</span>`;
                    } else {
                        statusBtn = `<button onclick="marcarFechado(${sim.id})" class="text-xs bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-3 py-1 rounded-md shadow-sm transition">Marcar Fechado</button>`;
                    }

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${cliente}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${rota}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatarMoeda(sim.preco_sugerido)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-indigo-600">${formatarMoeda(sim.preco_ia)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm">${statusBtn}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('loading').innerText = "Erro ao carregar histórico.";
            }
        }

        async function marcarFechado(id) {
            try {
                const res = await fetch(`/api/simulacoes/${id}/fechar`, { method: 'POST' });
                if(res.ok) {
                    carregarHistorico(); // Recarrega a tabela
                }
            } catch (error) {
                alert("Erro ao fechar frete");
            }
        }

        // Iniciar
        carregarHistorico();
    </script>
</body>
</html>
