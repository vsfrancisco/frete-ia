<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Veículo - Frete IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <header class="bg-indigo-600 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
                <span class="text-2xl text-white">🚚</span>
                <h1 class="text-xl font-bold text-white tracking-wide">Frete IA <span class="text-indigo-200 text-sm font-normal">Pro</span></h1>
            </a>
            <a href="/" class="text-white text-sm bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-md transition font-medium border border-indigo-400">
                &larr; Voltar ao Início
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Novo Veículo</h2>
            <p class="text-sm text-gray-500 mb-6 text-center">Adicione um veículo à frota</p>
            
            <form id="form-veiculo" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Empresa Proprietária</label>
                    <select id="transportadora_id" required class="w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                        <option value="">Carregando...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Veículo</label>
                    <input type="text" id="nome" required placeholder="Ex: Carreta LS Baú" class="w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. Eixos</label>
                        <input type="number" id="eixos" required min="2" max="9" placeholder="Ex: 6" class="w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Capacidade (kg)</label>
                        <input type="number" id="capacidade" required min="100" placeholder="Ex: 25000" class="w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Consumo (km por Litro)</label>
                    <input type="number" id="consumo" step="0.1" required placeholder="Ex: 2.5" class="w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                </div>

                <button type="submit" id="btn-salvar" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-md shadow transition">
                    Salvar Veículo
                </button>
            </form>

            <div id="msg-sucesso" class="hidden mt-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-md text-sm text-center font-medium">
                Veículo cadastrado na frota com sucesso!
            </div>
        </div>
    </main>

    <script>
        // Carrega as transportadoras no select logo que a página abre
        window.addEventListener('DOMContentLoaded', async () => {
            const select = document.getElementById('transportadora_id');
            try {
                const res = await fetch('/transportadoras');
                const transps = await res.json();
                select.innerHTML = '<option value="">Selecione a empresa...</option>';
                transps.forEach(t => {
                    select.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
                });
            } catch (e) {
                select.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        });

        // Evento de salvar o veículo
        document.getElementById('form-veiculo').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            const dados = {
                transportadora_id: parseInt(document.getElementById('transportadora_id').value),
                nome: document.getElementById('nome').value,
                eixos: parseInt(document.getElementById('eixos').value),
                capacidade_kg: parseFloat(document.getElementById('capacidade').value),
                consumo_km_l: parseFloat(document.getElementById('consumo').value)
            };

            try {
                const res = await fetch('/veiculos/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert("Erro do servidor:\n" + JSON.stringify(err.detail));
                    throw new Error("Falha na API");
                }

                document.getElementById('msg-sucesso').classList.remove('hidden');
                
                // Limpa os campos, MAS mantém a transportadora selecionada (ajuda a cadastrar vários caminhões rápidos)
                document.getElementById('nome').value = '';
                document.getElementById('eixos').value = '';
                document.getElementById('capacidade').value = '';
                document.getElementById('consumo').value = '';
                
                setTimeout(() => {
                    document.getElementById('msg-sucesso').classList.add('hidden');
                }, 3000);

            } catch (error) {
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Salvar Veículo";
            }
        };
    </script>
</body>
</html>
